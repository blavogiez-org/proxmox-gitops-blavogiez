name: "Deployment intelligent et complet"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-analysis-checkov:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Analyse checkov
        run: docker run --rm -v "$PWD:/repo" bridgecrew/checkov:2 -d /repo --quiet

  static-analysis-tflint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Analyse TFLint
        run: docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/terraform-linters/tflint:latest --recursive

  static-analysis-hadolint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Analyse Hadolint
        # Suppression de continue-on-error et no-fail pour rendre le job bloquant
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          recursive: true

  terraform:
    needs: [ static-analysis-checkov, static-analysis-tflint, static-analysis-hadolint ]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare SSH Key for Terraform
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}" > ~/.ssh/proxmox_tf_key
          chmod 600 ~/.ssh/proxmox_tf_key

      - name: Prepare Public SSH Key
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/proxmox_vm_public.pub

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan & Safety Check
        id: plan
        run: |
          # Génération du plan dans un fichier binaire
          terraform -chdir=terraform plan -out=tfplan
          
          # Analyse du plan pour détecter des suppressions (destroy)
          # On utilise -json pour une analyse fiable via jq (souvent présent sur les runners)
          # Ou un grep robuste sur la sortie texte si jq n'est pas là.
          
          PLAN_OUTPUT=$(terraform -chdir=terraform show -no-color tfplan)
          
          if echo "$PLAN_OUTPUT" | grep -E "to destroy|destroying"; then
            echo "::error::❌ SÉCURITÉ : Le plan prévoit de supprimer des ressources ! Déploiement stoppé."
            echo "$PLAN_OUTPUT" | grep -E "destroying|to destroy"
            exit 1
          else
            echo "✅ Aucun risque de destruction détecté."
          fi
        env:
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_insecure: ${{ secrets.PROXMOX_INSECURE }}
          TF_VAR_proxmox_ssh_username: ${{ secrets.PROXMOX_SSH_USERNAME }}
          TF_VAR_storage: ${{ secrets.PROXMOX_STORAGE }}
          TF_VAR_proxmox_ssh_private_key_path: ~/.ssh/proxmox_tf_key
          TF_VAR_ssh_public_key_path: ~/.ssh/proxmox_vm_public.pub

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve tfplan
        env:
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_insecure: ${{ secrets.PROXMOX_INSECURE }}
          TF_VAR_proxmox_ssh_username: ${{ secrets.PROXMOX_SSH_USERNAME }}
          TF_VAR_storage: ${{ secrets.PROXMOX_STORAGE }}
          TF_VAR_proxmox_ssh_private_key_path: ~/.ssh/proxmox_tf_key
          TF_VAR_ssh_public_key_path: ~/.ssh/proxmox_vm_public.pub

  ansible:
    needs: [ terraform ]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service: [ "caddy", "actions-runner" ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH (pour Ansible)
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.ANSIBLE_SSH_KEY }}
          log-public-key: false

      - name: Désactiver HostKeyChecking
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Setup Ansible
        run: |
          pipx install ansible-core || echo "Ansible déjà installé"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible Collections
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: "Déploiement de ${{ matrix.service }}"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i ansible/inventories/inventory.yml ansible/playbooks/deploy-${{ matrix.service }}.yml
